<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hämäränkävijät | Blog</title>
    <meta name="description" content="Development notes and updates from Hämäränkävijät." />
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <header class="site-frame site-header">
      <div class="top-strip"><span>A Finnish mythological roleplaying game</span></div>
      <div class="brand-row">
        <div><a class="logo-link" href="/en/" aria-label="Home"><h1 class="logo-mark">Hämäränkävijät</h1></a></div>
        <nav class="lang-switch" aria-label="Language switch">
          <label for="lang-select-blog-en" class="visually-hidden">Language</label>
          <select id="lang-select-blog-en" data-lang-select>
            <option value="/fi/blog/">Suomeksi</option>
            <option value="/en/blog/" selected>English</option>
          </select>
        </nav>
      </div>
      <nav class="site-nav" aria-label="Main navigation">
        <button class="nav-toggle" aria-expanded="false">Menu</button>
        <ul class="nav-list"><li><a href="/en/story/">Story</a></li><li><a href="/en/blog/" aria-current="page">Blog</a></li><li><a href="/en/educators/">Educators</a></li><li><a href="/en/downloads/">Download now!</a></li></ul>
      </nav>
    </header>

    <main class="site-frame">
      <p class="body-copy">Latest development notes, updates, and news from Hämäränkävijät.</p>
      <div class="blog-list" data-blog-list></div>
    </main>

    <footer class="site-frame site-footer"><p>Hämäränkävijät | <span data-year></span></p></footer>
    <script src="/assets/js/site.js"></script>
    <script src="/assets/js/blog.js"></script>
  </body>
</html>
